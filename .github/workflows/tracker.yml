name: October Flight Tracker Bot

on:
  schedule:
    - cron: '0 10,22 * * *'
  workflow_dispatch:

jobs:
  track_and_predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    # This line tells GitHub to use Node 24 right now
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6 # Updated to v6

      - name: Set up Python
        uses: actions/setup-python@v6 # Updated to v6
        with:
          python-version: '3.12' # Using a modern 2026 Python version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tracker
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and Push Database Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add flights.db
          git diff-index --quiet HEAD 
          git commit -m "Update flight history"
          git push
